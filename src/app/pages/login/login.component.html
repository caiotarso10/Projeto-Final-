<main class="auth-page">
  <div class="auth-card">
    <img class= "auth-img"  src="/assents/logo.png" alt="">
    <p class="auth-subtitle">Insira seus dados para acessar sua conta.</p>

    <div class="alerta alerta-erro" *ngIf="erroMensagem">{{ erroMensagem }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control" placeholder="exemplo@email.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" [(ngModel)]="senha" class="form-control" placeholder="Sua senha secreta" required>
      </div>

      <a href="#" class="forgot-password">Esqueci minha senha</a>

      <button type="submit" class="btn-auth">Entrar</button>
    </form>

    <div class="auth-links">
      <p>Novo por aqui? <a routerLink="/cadastro">Criar uma conta</a></p>
    </div>
  </div>
</main>
