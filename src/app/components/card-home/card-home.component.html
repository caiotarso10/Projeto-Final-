<div class="card">
  <img [src]="produto.imagem" [alt]="produto.nome" class="card-img">
  <div class="card-body">
    <h3 class="card-title">{{ produto.nome }}</h3>
    <p class="card-desc">{{ produto.descricao }}</p>
    
    <p class="card-preco">{{ produto.preco | currency:'BRL':'symbol':'1.2-2' }}</p>
    <button class="btn-comprar">Comprar</button>
  </div>
</div>
