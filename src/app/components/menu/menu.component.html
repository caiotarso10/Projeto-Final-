<div
  class="offcanvas offcanvas-start"
  tabindex="-1"
  #menuOffcanvas
  id="appMenu"
  aria-labelledby="appMenuLabel">

  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title" id="appMenuLabel">Menu</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Fechar"
      (click)="close()">
    </button>
  </div>

  <div class="offcanvas-body p-0">
    <ul class="nav nav-pills flex-column">
      <li class="nav-item">
        <a class="nav-link d-flex align-items-center gap-2" routerLink="/home" routerLinkActive="active" (click)="close()">
          <i class="bi bi-house"></i>
          Início
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link d-flex align-items-center gap-2" routerLink="/catalogo" routerLinkActive="active" (click)="close()">
          <i class="bi bi-grid"></i>
          Catálogo
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link d-flex align-items-center gap-2" routerLink="/compra" routerLinkActive="active" (click)="close()">
          <i class="bi bi-cart"></i>
          Compra
        </a>
      </li>
    </ul>
  </div>

</div>
