<div id="carouselExampleDark" #carouselRef class="carousel carousel-dark slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    
    <div class="carousel-item active">
      <div class="carrossel-frame" [routerLink]="['/catalogo']" [queryParams]="{ marca: 'eudora' }" style="cursor: pointer;">
        <img src="/assents/eudora-logo.png" class="carrossel-img" alt="Eudora">
      </div>
    </div>
    
    <div class="carousel-item">
      <div class="carrossel-frame" [routerLink]="['/catalogo']" [queryParams]="{ marca: 'natura' }" style="cursor: pointer;">
        <img src="/assents/natura-logo.png" class="carrossel-img" alt="Natura">
      </div>
    </div>
    
    <div class="carousel-item">
      <div class="carrossel-frame" [routerLink]="['/catalogo']" [queryParams]="{ marca: 'oboticario' }" style="cursor: pointer;">
        <img src="/assents/oboticario-logo.png" class="carrossel-img" alt="O Boticário">
      </div>
    </div>
    
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
